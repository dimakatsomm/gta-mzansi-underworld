name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gtarp
          POSTGRES_PASSWORD: gtarp
          POSTGRES_DB: gtarp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gtarp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://gtarp:gtarp@localhost:5432/gtarp_test
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
      FIVEM_INGEST_TOKEN: ci-test-ingest-token

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start NATS with JetStream
        run: docker run -d --name nats-js -p 4222:4222 nats:2.10-alpine -js && sleep 3

      - run: pnpm -F @gtarp/db prisma:generate

      - name: Run Prisma migrations
        run: pnpm -F @gtarp/db prisma:deploy

      - name: Smoke check DB schema
        run: psql "$DATABASE_URL" -c "SELECT to_regclass('\"Player\"') IS NOT NULL"

      - name: Seed sample data
        run: pnpm -F @gtarp/db seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Smoke check seed counts (exact)
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c 'SELECT count(*) FROM "Player"' | tr -d ' ')
          echo "Player count: $COUNT"
          [ "$COUNT" -eq 8 ] || (echo "Expected exactly 8 players, got $COUNT" && exit 1)

      - name: Re-run seed (idempotency check)
        run: pnpm -F @gtarp/db seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Smoke check seed counts after re-run
        run: |
          COUNT=$(psql "$DATABASE_URL" -t -c 'SELECT count(*) FROM "Player"' | tr -d ' ')
          echo "Player count after re-run: $COUNT"
          [ "$COUNT" -eq 8 ] || (echo "Seed not idempotent: expected 8 players, got $COUNT" && exit 1)

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
