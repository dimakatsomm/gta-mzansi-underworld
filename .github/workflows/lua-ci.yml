name: Lua CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  luacheck:
    name: Luacheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install luarocks + luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          # Collect all Lua files under fivem-resources.
          # If none exist yet (M0 stub), exit 0 cleanly.
          mapfile -t LUA_FILES < <(find apps/fivem-resources -name "*.lua" 2>/dev/null || true)
          if [[ ${#LUA_FILES[@]} -eq 0 ]]; then
            echo "No Lua files found — luacheck skipped (expected in M0)"
            exit 0
          fi
          luacheck "${LUA_FILES[@]}"
