name: gtarp-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gtarp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-gtarp}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gtarp}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru --save 60 100
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  nats:
    image: nats:2.10-alpine
    restart: always
    command: ['-js', '-sd', '/data', '-m', '8222']
    ports:
      - '0.0.0.0:4222:4222' # FiveM server connects from outside Docker
      - '127.0.0.1:8222:8222' # monitoring — localhost only
    volumes:
      - nats_data_prod:/data
    deploy:
      resources:
        limits:
          memory: 512m

  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - '127.0.0.1:9100:9100'
    deploy:
      resources:
        limits:
          memory: 64m

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    ports:
      - '127.0.0.1:9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data_prod:
  redis_data_prod:
  nats_data_prod:
  prometheus_data_prod:
