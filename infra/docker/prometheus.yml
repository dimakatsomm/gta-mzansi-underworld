global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          env: production

  - job_name: backend
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          env: production
    metrics_path: /metrics

  - job_name: ai-orchestrator
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          env: production
    metrics_path: /metrics

  - job_name: event-worker
    static_configs:
      - targets: ['host.docker.internal:3003']
        labels:
          env: production
    metrics_path: /metrics

  - job_name: nats
    static_configs:
      - targets: ['nats:8222']
        labels:
          env: production
    metrics_path: /metrics
